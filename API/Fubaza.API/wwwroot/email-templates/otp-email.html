<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body, table, td, a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        table {
            border-collapse: collapse !important;
        }

        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        a[x-apple-data-detectors] {
            color: inherit !important;
            text-decoration: none !important;
            font-size: inherit !important;
            font-family: inherit !important;
            font-weight: inherit !important;
            line-height: inherit !important;
        }

        @media screen and (max-width: 600px) {
            .wrapper {
                width: 100% !important;
                padding: 0 !important;
            }

            .content {
                padding: 20px !important;
            }

            .otp-code {
                font-size: 26px !important;
                padding: 15px !important;
            }
        }
    </style>
</head>
<body style="background-color: #f4f4f4;">
    <center>
        <table border="0" cellpadding="0" cellspacing="0" width="100%">
            <tr>
                <td align="center" bgcolor="#f4f4f4">
                    <table border="0" cellpadding="0" cellspacing="0" width="600" class="wrapper" style="max-width: 600px; background-color: #ffffff;">

                        <!-- Message -->
                        <tr>
                            <td class="content" style="padding: 30px 30px 10px 30px; background-color: #ffffff; color: #555555; font-size: 16px;">
                                <p style="margin: 0 0 15px 0;">Your OTP for email verification is:</p>
                            </td>
                        </tr>

                        <!-- OTP -->
                        <tr>
                            <td align="center" style="padding: 0 30px 20px 30px; background-color: #ffffff;">
                                <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f0f0; border-radius: 6px;">
                                    <tr>
                                        {#EmailVerificationCode#}
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- Expiry -->
                        <tr>
                            <td style="padding: 0 30px 10px 30px; background-color: #ffffff; font-size: 14px; color: #555555;">
                                <p style="margin: 0;">This OTP will expire in 48 hours.</p>
                            </td>
                        </tr>

                        <!-- Disclaimer -->
                        <tr>
                            <td style="padding: 0 30px 30px 30px; background-color: #ffffff; font-size: 14px; color: #555555;">
                                <p style="margin: 0;">If you didn't request this email change, please ignore this email.</p>
                            </td>
                        </tr>

                    </table>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
